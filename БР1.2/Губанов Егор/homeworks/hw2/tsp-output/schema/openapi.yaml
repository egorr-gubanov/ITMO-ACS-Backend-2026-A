openapi: 3.0.0
info:
  title: Rent service
  version: 0.0.0
tags:
  - name: Auth
  - name: Me
  - name: Property types
  - name: Properties
  - name: Deals
  - name: Messages
  - name: History
paths:
  /api/v1/auth/login:
    post:
      operationId: AuthRoutes_login
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOk'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
  /api/v1/auth/register:
    post:
      operationId: AuthRoutes_register
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthOk'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ConflictError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
  /api/v1/deals/:
    post:
      operationId: DealRoutes_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ConflictError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Deals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealCreateBody'
      security:
        - BearerAuth: []
  /api/v1/deals/{id}:
    get:
      operationId: DealRoutes_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Deals
      security:
        - BearerAuth: []
    patch:
      operationId: DealRoutes_patch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ConflictError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Deals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealPatchBody'
      security:
        - BearerAuth: []
  /api/v1/history/:
    get:
      operationId: HistoryRoutes_all
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - History
      security:
        - BearerAuth: []
  /api/v1/me/:
    get:
      operationId: MeRoutes_profile
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Me
      security:
        - BearerAuth: []
  /api/v1/me/owning:
    get:
      operationId: MeRoutes_owning
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwningResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Me
      security:
        - BearerAuth: []
  /api/v1/me/owning/deals:
    get:
      operationId: MeRoutes_owningDeals
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Me
      security:
        - BearerAuth: []
  /api/v1/me/renting:
    get:
      operationId: MeRoutes_renting
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentingResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Me
      security:
        - BearerAuth: []
  /api/v1/messages/:
    get:
      operationId: MessageRoutes_list
      parameters:
        - $ref: '#/components/parameters/MessageListQuery.property_id'
        - $ref: '#/components/parameters/MessageListQuery.page'
        - $ref: '#/components/parameters/MessageListQuery.page_size'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Messages
      security:
        - BearerAuth: []
    post:
      operationId: MessageRoutes_send
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreateBody'
      security:
        - BearerAuth: []
  /api/v1/messages/{id}/read:
    patch:
      operationId: MessageRoutes_markRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Messages
      security:
        - BearerAuth: []
  /api/v1/photos/{id}:
    delete:
      operationId: PhotoRoutes_remove
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
      security:
        - BearerAuth: []
  /api/v1/properties/:
    get:
      operationId: PublicProperties_list
      parameters:
        - $ref: '#/components/parameters/PropertyListQuery.type_id'
        - $ref: '#/components/parameters/PropertyListQuery.city'
        - $ref: '#/components/parameters/PropertyListQuery.min_price'
        - $ref: '#/components/parameters/PropertyListQuery.max_price'
        - $ref: '#/components/parameters/PropertyListQuery.page'
        - $ref: '#/components/parameters/PropertyListQuery.page_size'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
    post:
      operationId: OwnerProperties_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDetail'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateBody'
      security:
        - BearerAuth: []
  /api/v1/properties/{id}:
    get:
      operationId: PublicProperties_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDetail'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
    put:
      operationId: OwnerProperties_update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDetail'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyUpdateBody'
      security:
        - BearerAuth: []
    delete:
      operationId: OwnerProperties_remove
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
      security:
        - BearerAuth: []
  /api/v1/properties/{propertyId}/photos:
    post:
      operationId: OwnerProperties_addPhoto
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/UnauthorizedError'
                  - $ref: '#/components/schemas/ForbiddenError'
                  - $ref: '#/components/schemas/NotFoundError'
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/ServerError'
      tags:
        - Properties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhotoCreateBody'
      security:
        - BearerAuth: []
  /api/v1/property-types/:
    get:
      operationId: PropertyTypeRoutes_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertyTypeOut'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
      tags:
        - Property types
components:
  parameters:
    MessageListQuery.page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    MessageListQuery.page_size:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    MessageListQuery.property_id:
      name: property_id
      in: query
      required: false
      schema:
        type: string
      explode: false
    PropertyListQuery.city:
      name: city
      in: query
      required: false
      schema:
        type: string
      explode: false
    PropertyListQuery.max_price:
      name: max_price
      in: query
      required: false
      schema:
        type: number
        format: double
      explode: false
    PropertyListQuery.min_price:
      name: min_price
      in: query
      required: false
      schema:
        type: number
        format: double
      explode: false
    PropertyListQuery.page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    PropertyListQuery.page_size:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    PropertyListQuery.type_id:
      name: type_id
      in: query
      required: false
      schema:
        type: string
      explode: false
  schemas:
    AuthOk:
      type: object
      required:
        - access_token
        - token_type
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'
    BearerAuth:
      type: object
      required:
        - type
        - scheme
      properties:
        type:
          type: string
          enum:
            - http
          description: Http authentication
        scheme:
          type: string
          enum:
            - bearer
          description: bearer auth scheme
      description: ''
    ConflictError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          enum:
            - 409
        message:
          type: string
          enum:
            - Уже есть или не подходит
      allOf:
        - $ref: '#/components/schemas/Error'
    DealCreateBody:
      type: object
      required:
        - property_id
        - start_date
        - end_date
      properties:
        property_id:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        total_price:
          type: number
          format: double
    DealListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DealOut'
        total:
          type: integer
          format: int32
    DealOut:
      type: object
      required:
        - id
        - property_id
        - tenant_id
        - status
        - start_date
        - end_date
        - total_price
        - created_at
        - updated_at
      properties:
        id:
          type: string
        property_id:
          type: string
        tenant_id:
          type: string
        status:
          $ref: '#/components/schemas/DealStatus'
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        total_price:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        property:
          $ref: '#/components/schemas/PropertyShort'
    DealPatchBody:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/DealStatus'
    DealStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - COMPLETED
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    ForbiddenError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          enum:
            - 403
        message:
          type: string
          enum:
            - Нельзя так
      allOf:
        - $ref: '#/components/schemas/Error'
    HistoryResponse:
      type: object
      required:
        - messages
        - deals
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageOut'
        deals:
          type: array
          items:
            $ref: '#/components/schemas/DealOut'
    LoginBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    MessageCreateBody:
      type: object
      required:
        - receiver_id
        - property_id
        - content
      properties:
        receiver_id:
          type: string
        property_id:
          type: string
        content:
          type: string
    MessageListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MessageOut'
        total:
          type: integer
          format: int32
    MessageOut:
      type: object
      required:
        - id
        - sender_id
        - receiver_id
        - property_id
        - content
        - is_read
        - created_at
      properties:
        id:
          type: string
        sender_id:
          type: string
        receiver_id:
          type: string
        property_id:
          type: string
        content:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
    NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          enum:
            - 404
        message:
          type: string
          enum:
            - Не нашлось
      allOf:
        - $ref: '#/components/schemas/Error'
    OwnerShort:
      type: object
      required:
        - id
        - first_name
        - last_name
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
    OwningPropertyRow:
      type: object
      required:
        - property
        - active_deals
      properties:
        property:
          $ref: '#/components/schemas/PropertyShort'
        active_deals:
          type: array
          items:
            $ref: '#/components/schemas/DealOut'
    OwningResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OwningPropertyRow'
        total:
          type: integer
          format: int32
    PhotoCreateBody:
      type: object
      required:
        - photo_url
        - is_main
      properties:
        photo_url:
          type: string
        is_main:
          type: boolean
    PhotoOut:
      type: object
      required:
        - id
        - property_id
        - photo_url
        - is_main
        - created_at
      properties:
        id:
          type: string
        property_id:
          type: string
        photo_url:
          type: string
        is_main:
          type: boolean
        created_at:
          type: string
          format: date-time
    PropertyCreateBody:
      type: object
      required:
        - type_id
        - title
        - city
        - address
        - description
        - rental_conditions
        - price
        - is_published
      properties:
        type_id:
          type: string
        title:
          type: string
        city:
          type: string
        address:
          type: string
        description:
          type: string
        rental_conditions:
          type: string
        price:
          type: number
          format: double
        is_published:
          type: boolean
    PropertyDetail:
      type: object
      required:
        - id
        - owner_id
        - type_id
        - title
        - city
        - address
        - description
        - rental_conditions
        - price
        - is_published
        - created_at
        - updated_at
        - photos
        - owner
      properties:
        id:
          type: string
        owner_id:
          type: string
        type_id:
          type: string
        title:
          type: string
        city:
          type: string
        address:
          type: string
        description:
          type: string
        rental_conditions:
          type: string
        price:
          type: number
          format: double
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        photos:
          type: array
          items:
            $ref: '#/components/schemas/PhotoOut'
        owner:
          $ref: '#/components/schemas/OwnerShort'
    PropertyListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PropertyShort'
        total:
          type: integer
          format: int32
    PropertyShort:
      type: object
      required:
        - id
        - owner_id
        - type_id
        - title
        - city
        - address
